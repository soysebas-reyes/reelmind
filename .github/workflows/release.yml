# SPDX-License-Identifier: GPL-3.0-or-later
# Release: con un tag v* (o a mano), compila Windows (NSIS) y macOS (dmg+zip arm64, firmado y
# notarizado si los secrets de Apple están cargados) y sube todo al MISMO draft de GitHub Release.
# El draft se publica A MANO después del smoke test. Regla de oro: la release publicada debe tener
# latest.yml (win) Y latest-mac.yml (mac) además de setup.exe/.blockmap/dmg/zip.
#
# Secrets requeridos para firmar mac: CSC_LINK (p12 Developer ID Application en base64),
# CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID.
name: Release

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Pre-crear el draft evita la carrera en que los jobs win y mac crean dos drafts del mismo tag.
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Crear el draft release si no existe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V=$(node -p "require('./package.json').version")
          gh release view "v$V" >/dev/null 2>&1 || \
            gh release create "v$V" --draft --title "Reelo v$V" \
              --notes "Draft generado por CI — completar las notas antes de publicar."

  build:
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-15] # macos-15 = Apple Silicon (arm64)
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Firma + notarización SOLO en macOS. CSC_LINK/CSC_KEY_PASSWORD deben quedar VACÍOS en el
      # runner de Windows: electron-builder usa CSC_LINK como fallback de la firma Authenticode
      # (WIN_CSC_LINK ?? CSC_LINK), así que exponer el .p12 de Apple ahí firmaría el NSIS con el
      # cert equivocado (build rota o instalador con cadena no confiable). Se scopean por SO.
      CSC_LINK: ${{ matrix.os == 'macos-15' && secrets.CSC_LINK || '' }}
      CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-15' && secrets.CSC_KEY_PASSWORD || '' }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # FFmpeg de esta plataforma: lo bundlea el instalador y habilita los tests de integración.
      - run: npm run fetch:ffmpeg
      - name: Exponer FFmpeg a los tests
        shell: bash
        run: |
          EXT=""
          if [ "$RUNNER_OS" = "Windows" ]; then EXT=".exe"; fi
          echo "REELO_FFMPEG=$GITHUB_WORKSPACE/resources/ffmpeg/ffmpeg$EXT" >> "$GITHUB_ENV"
          echo "REELO_FFPROBE=$GITHUB_WORKSPACE/resources/ffmpeg/ffprobe$EXT" >> "$GITHUB_ENV"
      - run: npm test
      - run: npm run build
      - run: npx electron-builder --publish always
