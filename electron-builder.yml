# SPDX-License-Identifier: GPL-3.0-or-later
# Packaging: Windows (NSIS, sin firma por ahora — agregar CSC_LINK para firmar) y
# macOS (dmg + zip arm64, firmado + notarizado vía CSC_LINK/CSC_KEY_PASSWORD + APPLE_ID/
# APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID; sin esas env la firma/notarización se omite).
# FFmpeg viene de resources/ffmpeg (poblado por `npm run fetch:ffmpeg`, binarios de ESTA
# plataforma); auto-update publica a GitHub Releases (mac exige el target zip + firma).
appId: com.soysebas.reelo
productName: Reelo
copyright: GPL-3.0-or-later — independent derivative of palmier-io/palmier-pro

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

# Bundled FFmpeg/ffprobe land in <resources>/ffmpeg next to the asar; main points
# REELO_FFMPEG/FFPROBE at them when packaged.
extraResources:
  - from: resources/ffmpeg
    to: ffmpeg
    filter:
      - '**/*'

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
  # Generated by scripts/make-icon.mjs (Reelo pixel-art, committed).
  icon: build/icon.ico

mac:
  target:
    - target: dmg
      arch:
        - arm64
    # zip es OBLIGATORIO: electron-updater (Squirrel.Mac) solo aplica updates desde el zip.
    - target: zip
      arch:
        - arm64
  category: public.app-category.video
  # Generated by scripts/make-icon.mjs (tile redondeado estilo Big Sur, committed).
  icon: build/icon.icns
  artifactName: ${productName}-${version}-${arch}.${ext}
  # Requisitos de notarización: hardened runtime + entitlements de Electron (JIT).
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  # electron-builder 26: notariza con APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID del env.
  notarize: true
  # Los Mach-O de extraResources no entran al walk de osx-sign; sin firmarlos la notarización
  # RECHAZA el paquete. Verificar tras el build: codesign -dv sobre ambos binarios del .app.
  binaries:
    - Contents/Resources/ffmpeg/ffmpeg
    - Contents/Resources/ffmpeg/ffprobe

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  # GPL license page in the assisted installer.
  license: LICENSE

publish:
  provider: github
  owner: soysebas-reyes
  repo: reelo
